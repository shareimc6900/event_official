<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活動預約系統</title>
    <style>
        :root { --main: #003d74; --bg: #f5f7fa; }
        body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; padding: 20px; }
        .app-card { background: white; width: 100%; max-width: 500px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); overflow: hidden; position: relative; z-index: 1; }
        .hero-img { width: 100%; height: auto; display: block; }
        .form-content { padding: 25px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; font-size: 14px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .course-option { display: flex; justify-content: space-between; align-items: center; padding: 14px; border: 1px solid #eee; margin-bottom: 10px; border-radius: 12px; transition: 0.3s; cursor: pointer; }
        .course-option.selected { border-color: var(--main); background: #eef5ff; box-shadow: inset 0 0 0 1px var(--main); }
        .course-option.disabled { background: #f0f0f0; color: #999; cursor: not-allowed; }
        .badge { background: #ff4d4f; color: white; padding: 2px 8px; border-radius: 6px; font-size: 12px; margin-left: 5px; }
        .people-container { display: flex; align-items: center; gap: 8px; }
        .people-select { padding: 6px; border-radius: 6px; border: 1px solid #ccc; font-size: 14px; background: white; }
        .btn-submit { width: 100%; padding: 16px; background: var(--main); color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .contact-icon { position: fixed; bottom: 50px; right: 40px; width: 60px; height: 60px; background: #ff9800; border-radius: 50%; box-shadow: 0 4px 20px rgba(0,0,0,0.3); display: flex; justify-content: center; align-items: center; cursor: pointer; color: white; text-decoration: none; font-size: 30px; z-index: 9999; transition: transform 0.2s; }
    </style>
</head>
<body>
<div class="app-card">
    <img src="hero.jpg" class="hero-img">
    <div class="form-content">
        <div id="loading" style="text-align:center; padding:20px;">資料載入中，請稍候...</div>
        <div id="app" style="display:none;">
            <div class="input-group"><label>姓名</label><input type="text" id="name"></div>
            <div class="input-group"><label>員工編號</label><input type="text" id="staffId"></div>
            <div class="input-group"><label>公司名稱</label><select id="company"><option value="">請選擇公司</option></select></div>
            <div class="input-group"><label>部門名稱</label><input type="text" id="dept"></div>
            <div class="input-group"><label>電子郵件</label><input type="email" id="email"></div>
            <label style="margin-top:20px;">預約課程 (最多選 3 堂)</label>
            <div id="course-list"></div>
            <button class="btn-submit" onclick="sendToGoogle()">確認預約並送出</button>
        </div>
    </div>
</div>
<a href="mailto:share.imc.6900@gmail.com?subject=諮詢周邊活動預約" class="contact-icon">📩</a>

<script>
    // 這是最終確定的發布網址 (GID=29777723)
    const FINAL_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRVrkvwGv756FEzkGXrBiB1XlFyoI_8C8-6QWIRY-OQD9PFZ3Dgl8n5mUuZgB_NytEl-J6VwG1gG_Rc/pub?gid=29777723&single=true&output=csv";

    async function init() {
        try {
            // 使用 no-cache 模式強制重新抓取最新資料
            const res = await fetch(FINAL_URL + "&cache_bust=" + Date.now());
            if (!res.ok) throw new Error("Fetch failed");
            const csvText = await res.text();
            
            // 解析 CSV
            const rows = csvText.split('\n').filter(r => r.trim() !== "").map(row => 
                row.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/).map(cell => cell.replace(/^"|"$/g, '').trim())
            );
            
            const headers = rows[0];
            const data = rows.slice(1).map(row => {
                let obj = {};
                headers.forEach((h, i) => { if(h) obj[h] = row[i]; });
                return obj;
            });

            // 1. 填充公司
            const compSelect = document.getElementById('company');
            const comps = [...new Set(data.map(d => d["公司清單"]).filter(d => d))];
            comps.forEach(c => compSelect.add(new Option(c, c)));

            // 2. 填充課程
            const list = document.getElementById('course-list');
            data.filter(d => d["課程名稱"]).forEach(c => {
                const remains = parseInt(c["剩餘名額"]) || 0;
                const isFull = remains <= 0;
                const div = document.createElement('div');
                div.className = `course-option ${isFull ? 'disabled' : ''}`;
                div.innerHTML = `
                    <span>${c["課程名稱"]} <span class="badge">${isFull ? '額滿' : '剩 '+remains}</span></span>
                    <div class="people-container">
                        <span style="font-size:12px; color:#666;">人數:</span>
                        <select class="people-select" onclick="event.stopPropagation()">
                            <option value="1位">1位</option><option value="2位">2位</option><option value="3位">3位</option>
                        </select>
                        <input type="checkbox" class="course-check" value="${c["課程名稱"]}" style="display:none">
                    </div>`;
                if(!isFull) div.onclick = () => {
                    const cb = div.querySelector('input');
                    if(!cb.checked && document.querySelectorAll('.course-check:checked').length >= 3) return alert("最多選3堂喔！");
                    cb.checked = !cb.checked;
                    div.classList.toggle('selected');
                };
                list.appendChild(div);
            });

            document.getElementById('loading').style.display = 'none';
            document.getElementById('app').style.display = 'block';
        } catch (e) {
            console.error("載入出錯：", e);
            document.getElementById('loading').innerHTML = "資料同步中，請按 <b>F5</b> 重新整理網頁。<br><small>(錯誤代碼：ID_SYNC_ERR)</small>";
        }
    }

    function sendToGoogle() {
        const name = document.getElementById('name').value;
        const staffId = document.getElementById('staffId').value;
        const company = document.getElementById('company').value;
        const dept = document.getElementById('dept').value;
        const email = document.getElementById('email').value;
        const selected = Array.from(document.querySelectorAll('.course-option.selected')).map(el => {
            const courseName = el.querySelector('.course-check').value;
            const pCount = el.querySelector('.people-select').value;
            return `${courseName}_${pCount}`;
        });

        if(!name || !email || !company || selected.length === 0) return alert("資料填寫不完整喔！");

        const googleUrl = "https://docs.google.com/forms/d/e/1FAIpQLSeflEqB7N6HNkp2TurdcbPB5kivfHHUDBznoU1VWsFhoXN5Fw/formResponse?";
        const p = new URLSearchParams();
        p.append("entry.1873199984", name);
        p.append("entry.828598848", staffId);
        p.append("entry.305550878", company);
        p.append("entry.679583915", dept);
        p.append("entry.512558121", email);
        selected.forEach(s => p.append("entry.209578556", s));

        fetch(googleUrl + p.toString(), { mode: 'no-cors' }).then(() => {
            alert("預約成功！確認信將發送至您的信箱。");
            location.reload();
        }).catch(() => alert("送出失敗，請檢查網路。"));
    }
    init();
</script>
</body>
</html>
